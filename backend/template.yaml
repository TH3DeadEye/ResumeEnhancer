AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: |
  KMR Resume Enhancer - Restored Upload Flow Includes Cognito Auth, API Gateway, Lambda, and S3.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment name
  
  BedrockModelId:
    Type: String
    Default: anthropic.claude-3-5-sonnet-20240620-v1:0
    Description: Bedrock model ID for AI enhancement
    AllowedValues:
      - anthropic.claude-3-5-sonnet-20240620-v1:0
      - anthropic.claude-3-haiku-20240307-v1:0
      - anthropic.claude-3-opus-20240229-v1:0
  
  FrontendUrl:
    Type: String
    Default: http://localhost:3000
    Description: Frontend URL for Cognito callbacks

Conditions:
  IsProduction: !Equals
    - !Ref Environment
    - prod

Globals:
  Function:
    Runtime: python3.13
    MemorySize: 3008
    Tracing: Active
    Environment:
      Variables:
        PARSED_BUCKET_NAME: !Ref ParsedText
        RESUMES_TABLE_NAME: !Ref ResumesTable

Resources:
  # ============================================================================
  # 1. Cognito User Pool
  # ============================================================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub ${AWS::StackName}-${Environment}-UserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      AccountRecoverySetting:
        RecoveryMechanisms:
          - Name: verified_email
            Priority: 1
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: true
          TemporaryPasswordValidityDays: 7
      VerificationMessageTemplate:
        DefaultEmailOption: CONFIRM_WITH_CODE
        EmailMessage: Your KMR Resume Enhancer verification code is {####}
        EmailSubject: Verify your email for KMR Resume Enhancer
      AdminCreateUserConfig:
        AllowAdminCreateUserOnly: false
      MfaConfiguration: 'OFF'
      UserAttributeUpdateSettings:
        AttributesRequireVerificationBeforeUpdate:
          - email
      Schema:
        - Name: email
          Required: true
          Mutable: false
        - Name: name
          Required: true
          Mutable: true
      DeletionProtection: !If
        - IsProduction
        - ACTIVE
        - INACTIVE
      UserPoolTags:
        Environment: !Ref Environment
        Application: KMR-Resume-Enhancer

  # Cognito Domain for Hosted UI
  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub ${AWS::StackName}-${AWS::AccountId}
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: !Sub ${AWS::StackName}-${Environment}-WebClient
      GenerateSecret: false
      PreventUserExistenceErrors: ENABLED
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      # OAuth Configuration
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Sub ${FrontendUrl}/authorize
        - !Sub ${FrontendUrl}/callback
      LogoutURLs:
        - !Sub ${FrontendUrl}/logout
        - !Ref FrontendUrl
      AccessTokenValidity: 1
      IdTokenValidity: 1
      RefreshTokenValidity: 30
      TokenValidityUnits:
        AccessToken: hours
        IdToken: hours
        RefreshToken: days
      ReadAttributes:
        - email
        - name
        - email_verified
      WriteAttributes:
        - email
        - name

  # ============================================================================
  # 2. API Gateway
  # ============================================================================
  Api:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub
        - ${ResourceName} From Stack ${AWS::StackName}
        - ResourceName: Api
      StageName: Prod
      # RESTORED: Auth Block
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !GetAtt UserPool.Arn
            Identity:
              Header: Authorization
      DefinitionBody:
        openapi: '3.0'
        info:
          title: Resume Enhancer API
          description: API with Cognito JWT authentication
          version: '2.0'
        components:
          securitySchemes:
            CognitoAuthorizer:
              type: apiKey
              name: Authorization
              in: header
              x-amazon-apigateway-authtype: cognito_user_pools
              x-amazon-apigateway-authorizer:
                type: cognito_user_pools
                providerARNs:
                  - !GetAtt UserPool.Arn
        paths:
          /resume/upload:
            post:
              security:
                - CognitoAuthorizer: []
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${uploadHandler.Arn}/invocations
              responses: {}
          /resume/enhance:
            post:
              security:
                - CognitoAuthorizer: []
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${EnhancementHandler.Arn}/invocations
              responses: {}
          /resume/download:
            get:
              security:
                - CognitoAuthorizer: []
              x-amazon-apigateway-integration:
                httpMethod: POST
                type: aws_proxy
                uri: !Sub arn:${AWS::Partition}:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${DownloadHandler.Arn}/invocations
              responses: {}
      EndpointConfiguration: REGIONAL
      TracingEnabled: true
      # RESTORED: Fixed CORS
      Cors:
        AllowOrigin: '''http://localhost:3000'''
        AllowHeaders: '''Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token'''
        MaxAge: 5

  # ============================================================================
  # 3. Upload Function
  # ============================================================================
  uploadHandler:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: uploadHandler
      CodeUri: src/lambda
      Handler: upload.handler
      Runtime: python3.13
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Environment:
        Variables:
          # RESTORED: Clean variables
          UPLOADBUCKET_BUCKET_NAME: !Ref uploadBucket
          RESUMES_TABLE_NAME: !Ref ResumesTable
      Events:
        ApiPOSTresumeupload:
          Type: Api
          Properties:
            Path: /resume/upload
            Method: POST
            RestApiId: !Ref Api
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:GetObject
                - s3:ListBucket
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${uploadBucket}
                - !Sub arn:${AWS::Partition}:s3:::${uploadBucket}/*
        - DynamoDBCrudPolicy:
            TableName: !Ref ResumesTable

  uploadHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${uploadHandler}

  # ============================================================================
  # 4. Upload Bucket
  # ============================================================================
  uploadBucket:
    Type: AWS::S3::Bucket
    DependsOn: ExtractionHandlerS3Permission
    Properties:
      BucketName: !Sub ${AWS::StackName}-upload-${AWS::AccountId}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # RESTORED: Added S3 CORS
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - '*'
            AllowedMethods:
              - PUT
              - POST
            AllowedOrigins:
              - http://localhost:3000
            MaxAge: 3000
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt ExtractionHandler.Arn

  ExtractionHandlerS3Permission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ExtractionHandler
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub arn:${AWS::Partition}:s3:::${AWS::StackName}-upload-${AWS::AccountId}

  uploadBucketBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref uploadBucket
      PolicyDocument:
        Id: RequireEncryptionInTransit
        Version: '2012-10-17'
        Statement:
          - Principal: '*'
            Action: '*'
            Effect: Deny
            Resource:
              - !GetAtt uploadBucket.Arn
              - !Sub ${uploadBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # ============================================================================
  # RESUMES TABLE - Stores resume metadata per user
  # ============================================================================
  ResumesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub ${AWS::StackName}-resumes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: resume_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH      # Partition key - groups all resumes by user
        - AttributeName: resume_id
          KeyType: RANGE     # Sort key - unique per resume
      GlobalSecondaryIndexes:
        - IndexName: resume-id-index
          KeySchema:
            - AttributeName: resume_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: KMR-Resume-Enhancer

  # ============================================================================
  # 5. Extraction Handler (Triggered by uploadBucket)
  # ============================================================================
  ExtractionHandler:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: ExtractionHandler
      CodeUri: src/lambda
      Handler: extraction.handler
      Runtime: python3.13
      MemorySize: 3008
      Timeout: 60
      Tracing: Active
      Environment:
        Variables:
          UPLOAD_BUCKET_NAME: !Sub ${AWS::StackName}-upload-${AWS::AccountId}
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub ${AWS::StackName}-upload-${AWS::AccountId}
        - S3CrudPolicy:
            BucketName: !Ref ParsedText
        - DynamoDBCrudPolicy:
            TableName: !Ref ResumesTable
        - Statement:
            - Effect: Allow
              Action:
                - textract:DetectDocumentText
                - textract:AnalyzeDocument
              Resource: '*'

  ExtractionHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${ExtractionHandler}

  # ============================================================================
  # 6. Parser Lambda (Triggered by ParsedText S3 raw/ prefix)
  # ============================================================================
  ParserHandler:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: ParserHandler
      CodeUri: src/lambda
      Handler: parser.handler
      Runtime: python3.13
      MemorySize: 3008
      Timeout: 120
      Tracing: Active
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Events:
        S3NewRawFile:
          Type: S3
          Properties:
            Bucket: !Ref ParsedText
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .json
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ResumesTable
        - S3CrudPolicy:
            BucketName: !Ref ParsedText
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'

  ParserHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${ParserHandler}

  # ============================================================================
  # 7. Parsed Text Bucket
  # ============================================================================
  ParsedText:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      # Lifecycle rule to delete raw files after 90 days (cost savings)
      LifecycleConfiguration:
        Rules:
          - Id: DeleteRawFilesAfter90Days
            Prefix: raw/
            Status: Enabled
            ExpirationInDays: 90

  ParsedTextBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ParsedText
      PolicyDocument:
        Id: RequireEncryptionInTransit
        Version: '2012-10-17'
        Statement:
          - Principal: '*'
            Action: '*'
            Effect: Deny
            Resource:
              - !GetAtt ParsedText.Arn
              - !Sub ${ParsedText.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: 'false'

  # ============================================================================
  # 8. Scoring Lambda
  # ============================================================================
  ScoringHandler:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: ScoringHandler
      CodeUri: src/lambda
      Handler: scoring.handler
      Runtime: python3.13
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ParsedText
        - DynamoDBReadPolicy:
            TableName: !Ref ResumesTable

  ScoringHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${ScoringHandler}

  # ============================================================================
  # 9. Enhancement Flow
  # ============================================================================
  EnhancementHandler:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: EnhancementHandler
      CodeUri: src/lambda
      Handler: enhancement.handler
      Runtime: python3.13
      MemorySize: 3008
      Timeout: 120
      Tracing: Active
      Environment:
        Variables:
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          GENERATEDBUCKET_BUCKET_NAME: !Ref GeneratedBucket
          GENERATEDBUCKET_BUCKET_ARN: !GetAtt GeneratedBucket.Arn
      Events:
        ApiPOSTresumeenhance:
          Type: Api
          Properties:
            Path: /resume/enhance
            Method: POST
            RestApiId: !Ref Api
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ParsedText
        - DynamoDBCrudPolicy:
            TableName: !Ref ResumesTable
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: '*'
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
                - s3:PutObject
                - s3:DeleteObject
                - s3:ListBucket
              Resource:
                - !Sub arn:${AWS::Partition}:s3:::${GeneratedBucket}
                - !Sub arn:${AWS::Partition}:s3:::${GeneratedBucket}/*
  GeneratedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3
      PublicAccessBlockConfiguration:
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
  GeneratedBucketBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref GeneratedBucket
      PolicyDocument:
        Id: RequireEncryptionInTransit
        Version: '2012-10-17'
        Statement:
          - Principal: '*'
            Action: '*'
            Effect: Deny
            Resource:
              - !GetAtt GeneratedBucket.Arn
              - !Sub ${GeneratedBucket.Arn}/*
            Condition:
              Bool:
                aws:SecureTransport: 'false'
  DownloadHandler:
    Type: AWS::Serverless::Function
    Properties:
      Description: !Sub
        - Stack ${AWS::StackName} Function ${ResourceName}
        - ResourceName: DownloadHandler
      CodeUri: src/lambda
      # FIXED: Typo in handler name
      Handler: download.handler
      Runtime: python3.13
      MemorySize: 3008
      Timeout: 30
      Tracing: Active
      Environment:
        Variables:
          GENERATED_BUCKET_NAME: !Ref GeneratedBucket
      Events:
        ApiGETresumedownload:
          Type: Api
          Properties:
            Path: /resume/download
            Method: GET
            RestApiId: !Ref Api
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref GeneratedBucket
        - DynamoDBReadPolicy:
            TableName: !Ref ResumesTable

  DownloadHandlerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: !Sub /aws/lambda/${DownloadHandler}
  # ============================================================================
  # Meta Data
  # ============================================================================
Metadata:
  AWS::Composer::Groups:
    Group:
      Label: 'Upload resume '
      Members:
        - uploadHandler
        - uploadBucket
        - Api
    Group2:
      Label: Extracting Text from pdf
      Members:
        - ExtractionHandler
        - ResumesTable
    Group3:
      Label: Parsing Resume Data
      Members:
        - ParserHandler
        - ParsedText
    Group4:
      Label: Scoring Resume
      Members:
        - ScoringHandler
    Group5:
      Label: Tailor Resume
      Members:
        - EnhancementHandler
        - GeneratedBucket
    Group6:
      Label: Download Resume
      Members:
        - DownloadHandler
    Group7:
      Label: Auth
      Members:
        - UserPoolClient
        - UserPool